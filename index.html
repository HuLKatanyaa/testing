<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bahan Ajar UT - Tugas 3</title>
    
    <!-- Vue.js 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div id="app">
        <div class="container">
            <header>
                <h1><i class="fas fa-university"></i> Universitas Terbuka</h1>
                <p>Sistem Pemesanan & Stok Bahan Ajar</p>
            </header>
            
            <nav>
                <button 
                    @click="changeView('stok')" 
                    :class="{ active: currentView === 'stok' }">
                    <i class="fas fa-book"></i> Stok Bahan Ajar
                </button>
                <button 
                    @click="changeView('tracking')" 
                    :class="{ active: currentView === 'tracking' }">
                    <i class="fas fa-truck"></i> Tracking DO
                </button>
            </nav>

            <main>
                <!-- Error Message -->
                <div v-if="errorMessage" style="background: #fadbd8; color: #c0392b; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
                </div>

                <!-- Loading State -->
                <div v-if="isLoading" class="empty-state">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <p>Memuat data...</p>
                </div>

                <!-- Komponen Stok -->
                <stock-table 
                    v-if="currentView === 'stok' && !isLoading"
                    :raw-data="bahanAjarData" 
                    :upbjj-list="meta.upbjjList"
                    :kategori-list="meta.kategoriList"
                    @add-new="openForm"
                    @edit-item="openForm"
                    @delete-item="deleteItem"
                >
                </stock-table>

                <!-- Komponen Tracking -->
                <do-tracking 
                    v-if="currentView === 'tracking' && !isLoading"
                    :tracking-data="trackingData"
                    :last-sequence="lastDoSequence"
                    @create-do="handleCreateDo"
                >
                </do-tracking>
            </main>

            <!-- Modal -->
            <app-modal v-if="showModal" @close="showModal = false">
                <order-form 
                    :is-edit="isEditing"
                    :initial-data="formData"
                    @save="saveItem"
                    @cancel="showModal = false"
                >
                </order-form>
            </app-modal>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/services/api.js"></script>
    <script src="./js/components/app-modal.js"></script>
    <script src="./js/components/stock-table.js"></script>
    <script src="./js/components/order-form.js"></script>
    <script src="./js/components/do-tracking.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
